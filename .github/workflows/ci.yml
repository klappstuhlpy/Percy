name: CI

# Run on every push (any branch) and every pull request, plus a manual trigger.
# This is what makes the suite actually execute whenever new work is pushed —
# not just on master/main.
on:
  push:
  pull_request:
  workflow_dispatch:

# Least-privilege: the job only needs to read the checked-out code.
permissions:
  contents: read

# Cancel an in-progress run when a newer commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Tests, lint & types
    runs-on: ubuntu-latest

    # CI runs the non-beta (Linux) code path, which reads tokens/IDs from the
    # environment. The suite is fully mocked and never connects to Discord or a
    # database, so these dummy values just keep config/cog imports from failing.
    env:
      DISCORD_TOKEN: ci-dummy-token
      DISCORD_BETA_TOKEN: ci-dummy-token
      ANILIST_CLIENT_ID: "0"
      INTERNAL_API_PORT: "8090"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Run tests
        run: poetry run pytest

      # Ruff and Pyright currently report a backlog of pre-existing findings.
      # They run in informational (non-blocking) mode until that backlog is
      # worked down, at which point each should be promoted to a hard gate.
      - name: Lint (Ruff, non-blocking)
        continue-on-error: true
        run: poetry run ruff check .

      - name: Type check (Pyright, non-blocking)
        continue-on-error: true
        run: poetry run pyright
