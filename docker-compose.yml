services:
  bot:
    container_name: percy
    build: .
    restart: unless-stopped

    env_file: .env

    # Host networking: container shares host network stack
    network_mode: host

    # Helps debugging logs (optional but very useful)
    tty: true
    stdin_open: true

    # Ensure container uses same timezone as host (logs consistency)
    environment:
      PYTHONUNBUFFERED: "1"